      <path d="M456 126h26v34h-26zM532 126h26v34h-26zM456 204h26v34h-26zM532 204h26v34h-26zM456 282h26v34h-26zM532 282h26v34h-26zM456 360h26v34h-26zM532 360h26v34h-26z"/>
      <path d="M812 172h24v32h-24zM878 172h24v32h-24zM812 248h24v32h-24zM878 248h24v32h-24zM812 324h24v32h-24zM878 324h24v32h-24z"/>
