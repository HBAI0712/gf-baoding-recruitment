<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">保定城市原创线稿</title>
  <desc id="desc">以保定城市天际线、商务楼、高铁和金融数据线为灵感的原创矢量插画</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.62" stop-color="#e7f1fb"/>
      <stop offset="1" stop-color="#dbeaf7"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d8e9f9"/>
      <stop offset="1" stop-color="#adcce8"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0" x2="1">
      <stop offset="0" stop-color="#df1f2d"/>
      <stop offset="1" stop-color="#ff7a00"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#07192f" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="680" rx="24" fill="url(#sky)"/>
  <path d="M0 492C185 420 337 428 508 470C696 517 841 474 1008 422C1083 399 1145 391 1200 396V680H0Z" fill="#ffffff" opacity="0.72"/>
  <path d="M0 560C164 516 318 520 484 552C692 592 895 548 1200 500V680H0Z" fill="#cfe0ef"/>

