services:
  - type: web
    name: gf-baoding-recruitment
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGIN
        sync: false
      - key: TRUST_PROXY
        value: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_TO
        value: 380704292@qq.com
      - key: RESUME_MAX_SIZE_MB
        value: 12
      - key: RATE_WINDOW_MS
        value: 900000
      - key: RATE_MAX
        value: 20
